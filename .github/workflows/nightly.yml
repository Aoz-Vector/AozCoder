name: nightly-snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Build release archive
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          target="$(rustc -vV | sed -n 's/^host: //p')"
          archive="aozcoder-${short_sha}-${target}.tar.gz"
          mkdir -p dist
          cargo build --release --locked
          tar -C target/release -czf "dist/${archive}" aozcoder
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "archive=dist/${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Push short SHA tag
        id: tag
        shell: bash
        env:
          SHORT_SHA: ${{ steps.artifact.outputs.short_sha }}
        run: |
          set -euo pipefail
          git config user.name "Aoz Coder"
          git config user.email "aozcoder@outlook.com"
          if git ls-remote --tags origin | grep -qw "refs/tags/${SHORT_SHA}"; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "${SHORT_SHA}" -m "Nightly snapshot ${SHORT_SHA}"
            git push origin "${SHORT_SHA}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish snapshot release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHORT_SHA: ${{ steps.artifact.outputs.short_sha }}
          ARCHIVE: ${{ steps.artifact.outputs.archive }}
          CHECKSUM: ${{ steps.artifact.outputs.checksum }}
        run: |
          set -euo pipefail
          if gh release view "${SHORT_SHA}" >/dev/null 2>&1; then
            gh release upload "${SHORT_SHA}" "${ARCHIVE}" "${CHECKSUM}" --clobber
          else
            gh release create "${SHORT_SHA}" "${ARCHIVE}" "${CHECKSUM}" \
              --title "Nightly snapshot ${SHORT_SHA}" \
              --notes "Nightly snapshot built from commit ${SHORT_SHA}."
          fi